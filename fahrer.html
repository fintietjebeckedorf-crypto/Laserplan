<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fahrer App</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,sans-serif;background:#F4F3EF;color:#2C2C2A;}
header{background:#172015;color:#fff;padding:.8rem 1rem;display:flex;align-items:center;justify-content:space-between;}
header h1{font-size:1rem;font-weight:700;}
.dot{width:10px;height:10px;border-radius:50%;background:#9FE1CB;display:inline-block;margin-left:6px;vertical-align:middle;}
.dot.e{background:#E24B4A;}
.main{padding:1rem;}
.m-btn{display:block;width:100%;padding:.9rem 1rem;margin-bottom:.5rem;border-radius:10px;border:2px solid #ccc;background:#fff;font-size:1rem;font-weight:700;text-align:left;cursor:pointer;}
.day-btns{display:flex;gap:8px;margin-bottom:1rem;margin-top:1rem;}
.day-btn{flex:1;padding:.6rem;border-radius:10px;border:2px solid #ccc;background:#fff;font-size:.95rem;font-weight:700;cursor:pointer;}
.card{background:#fff;border-radius:10px;border-left:4px solid #639922;margin-bottom:.7rem;overflow:hidden;}
.card.done{opacity:.5;border-left-color:#aaa;}
.cbody{padding:.8rem 1rem;}
.ck{font-size:1rem;font-weight:600;color:#555;margin-bottom:2px;}
.ct{font-size:1.2rem;font-weight:700;margin-bottom:4px;}
.cm{font-size:.85rem;color:#777;}
.pass-row{display:flex;gap:6px;margin:.5rem 0;}
.pbtn{padding:5px 12px;border-radius:20px;border:1.5px solid #ccc;background:#f5f5f5;font-size:.8rem;font-weight:600;}
.pbtn.done{background:#EAF3DE;color:#27500A;border-color:#639922;}
.fbtn{width:100%;padding:.65rem;border:none;font-size:.95rem;font-weight:700;cursor:pointer;}
.fbtn.do{background:#EAF3DE;color:#27500A;}
.fbtn.undo{background:#f5f5f5;color:#888;font-size:.8rem;}
.empty{text-align:center;padding:2.5rem 1rem;color:#888;}
.ei{font-size:2.5rem;margin-bottom:.4rem;}
.lbl{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#888;margin-bottom:.4rem;}
</style>
</head>
<body>
<header>
  <h1>Fahrer App <span class="dot" id="dot"></span></h1>
  <button onclick="loadData()" style="background:rgba(255,255,255,.15);border:none;color:#9FE1CB;padding:.3rem .7rem;border-radius:20px;font-size:.8rem;cursor:pointer;">Laden</button>
</header>
<div class="main" id="main">
  <p style="color:#888;text-align:center;padding:2rem">Wird geladen...</p>
</div>
<script>
var SB_URL='https://lcxvknjhbxhgfkdfwloo.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxjeHZrbmpoYnhoZ2ZrZGZ3bG9vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4MzQxMzYsImV4cCI6MjA5NDQxMDEzNn0.XS2bKx-_96pEC5aY0lcMzRVwH_ce5xRM6bX86ZbxnaA';
var S=null;
var selMachine=localStorage.getItem('f_mid')||null;
var selDay=0;

function setDot(e){document.getElementById('dot').className='dot'+(e?' e':'');}

function schlagName(nr){
  if(!nr)return '-';
  var s=String(nr);
  while(s.length<4)s='0'+s;
  if(s.slice(0,3)==='000')return 'Schlag '+parseInt(s.slice(3));
  if(s.slice(0,3)==='001')return 'Schoenau '+parseInt(s.slice(3));
  if(s.slice(0,2)==='02')return 'Lessau '+parseInt(s.slice(2));
  return 'Schlag '+parseInt(s);
}

function todayDate(){var d=new Date();d.setHours(0,0,0,0);return d;}
function dateStr(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function addDays(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r;}

function fixArr(obj){
  if(obj===null||obj===undefined)return obj;
  if(Array.isArray(obj))return obj.map(fixArr);
  if(typeof obj!=='object')return obj;
  var keys=Object.keys(obj);
  if(keys.length>0&&keys.every(function(k){return /^\d+$/.test(k);})){
    var mx=Math.max.apply(null,keys.map(Number));
    var arr=new Array(mx+1);
    keys.forEach(function(k){arr[parseInt(k)]=fixArr(obj[k]);});
    return arr;
  }
  var out={};
  keys.forEach(function(k){out[k]=fixArr(obj[k]);});
  return out;
}

function loadData(){
  var xhr=new XMLHttpRequest();
  xhr.open('GET',SB_URL+'/rest/v1/laserplan?id=eq.main&select=data,updated_at',true);
  xhr.setRequestHeader('apikey',SB_KEY);
  xhr.setRequestHeader('Authorization','Bearer '+SB_KEY);
  xhr.onload=function(){
    if(xhr.status!==200){
      setDot(true);
      document.getElementById('main').innerHTML='<p style="color:red;padding:1rem">HTTP Fehler: '+xhr.status+'</p>';
      return;
    }
    try{
      var rows=JSON.parse(xhr.responseText);
      if(!rows||!rows.length||!rows[0]||!rows[0].data){
        document.getElementById('main').innerHTML='<p style="padding:1rem;color:#888">Keine Daten in Supabase</p>';
        return;
      }
      S=fixArr(rows[0].data);
      setDot(false);
      render();
    }catch(e){
      setDot(true);
      document.getElementById('main').innerHTML='<p style="color:red;padding:1rem">Fehler: '+e.message+'</p>';
    }
  };
  xhr.onerror=function(){
    setDot(true);
    document.getElementById('main').innerHTML='<p style="color:red;padding:1rem">Verbindungsfehler</p>';
  };
  xhr.send();
}

function saveData(){
  if(!S)return;
  S.lastUpdate=new Date().toISOString();
  var xhr=new XMLHttpRequest();
  xhr.open('POST',SB_URL+'/rest/v1/laserplan',true);
  xhr.setRequestHeader('apikey',SB_KEY);
  xhr.setRequestHeader('Authorization','Bearer '+SB_KEY);
  xhr.setRequestHeader('Content-Type','application/json');
  xhr.setRequestHeader('Prefer','resolution=merge-duplicates,return=minimal');
  xhr.send(JSON.stringify({id:'main',data:S,updated_at:S.lastUpdate}));
}

function getMach(id){
  var ms=Array.isArray(S.machines)?S.machines:Object.values(S.machines||{});
  for(var i=0;i<ms.length;i++){if(ms[i]&&ms[i].id===id)return ms[i];}
  return null;
}

function getBatches(){return Array.isArray(S.batches)?S.batches:Object.values(S.batches||{});}

function findBatch(id){
  var bs=getBatches();
  for(var i=0;i<bs.length;i++){if(bs[i]&&bs[i].id===id)return bs[i];}
  return null;
}

function render(){
  var main=document.getElementById('main');
  if(!S){main.innerHTML='<p style="padding:1rem;color:#888">Keine Daten</p>';return;}
  var ms=Array.isArray(S.machines)?S.machines:Object.values(S.machines||{});
  ms=ms.filter(function(m){return m&&m.name;});
  if(!ms.length){main.innerHTML='<div class="empty"><div class="ei">Robot</div>Keine Maschinen</div>';return;}
  var m=getMach(selMachine);
  var html='';
  html+='<div class="lbl">Maschine</div>';
  ms.forEach(function(mx){
    var sel=mx.id===selMachine;
    html+='<button class="m-btn" style="border-color:'+mx.color+';'+(sel?'background:'+mx.color+';color:#fff;':'')+'" onclick="selM(\''+mx.id+'\')">'+mx.name+'</button>';
  });
  if(!m){main.innerHTML=html+'<div class="empty"><div class="ei">above</div>Maschine antippen</div>';return;}
  var t=todayDate();
  var ds0=dateStr(t);
  var ds1=dateStr(addDays(t,1));
  var lbl0=t.toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'2-digit'});
  var lbl1=addDays(t,1).toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'2-digit'});
  html+='<div class="day-btns">';
  html+='<button class="day-btn" style="border-color:'+m.color+';'+(selDay===0?'background:'+m.color+';color:#fff;':'')+'" onclick="selD(0)">Heute</button>';
  html+='<button class="day-btn" style="border-color:'+m.color+';'+(selDay===1?'background:'+m.color+';color:#fff;':'')+'" onclick="selD(1)">Morgen</button>';
  html+='</div>';
  var ds=selDay===0?ds0:ds1;
  var lbl=selDay===0?lbl0:lbl1;
  html+='<div class="lbl">'+lbl+'</div>';
  var wp=m.weekPlan||{};
  var ids=wp[ds]||[];
  if(!ids.length){
    html+='<div class="empty"><div class="ei">cal</div>'+(selDay===0?'Heute':'Morgen')+' nichts geplant</div>';
    main.innerHTML=html;return;
  }
  ids.forEach(function(id){
    var origId=id.replace(/__pass\d+$/,'');
    var b=findBatch(origId);
    if(!b)return;
    var comp=(m.comp||{})[origId]||{};
    if(comp.done)return;
    var pm=id.match(/__pass(\d+)$/);
    var pi=pm?parseInt(pm[1]):-1;
    if(pi>=0&&(comp.passDone||{})[pi])return;
    var cfg=(m.passesConfig||{})[b.kultur]||{n:1,days:'7'};
    var n=parseInt(cfg.n)||1;
    var passHtml='';
    if(n>1){
      var pd=comp.passDone||{};
      passHtml='<div class="pass-row">';
      for(var p=0;p<n;p++){passHtml+='<div class="pbtn'+(pd[p]?' done':'')+'">'+( pd[p]?'checkmark ':'')+' DG '+(p+1)+'</div>';}
      passHtml+='</div>';
    }
    var btnId=pi>=0?id:origId;
    var btnLbl=pi>=0?('DG '+(pi+1)+' fertig'):'Fertig';
    html+='<div class="card">';
    html+='<div class="cbody">';
    html+='<div class="ck">'+b.kultur+(pi>=0?' DG'+(pi+1)+'/'+n:'')+'</div>';
    html+='<div class="ct">Satz '+b.satz+' - '+schlagName(b.schlag)+'</div>';
    html+='<div class="cm">'+(b.flaeche?b.flaeche.toFixed(2)+' ha':'')+'</div>';
    html+=passHtml;
    html+='</div>';
    html+='<button class="fbtn do" onclick="markDone(\''+m.id+'\',\''+btnId+'\')">Fertig: '+btnLbl+'</button>';
    html+='</div>';
  });
  main.innerHTML=html;
}

function selM(id){selMachine=id;localStorage.setItem('f_mid',id);render();}
function selD(d){selDay=d;render();}

function markDone(mid,id){
  var m=getMach(mid);if(!m)return;
  if(!m.comp)m.comp={};
  var pm=id.match(/^(.+)__pass(\d+)$/);
  if(pm){
    var oid=pm[1],p=parseInt(pm[2]);
    if(!m.comp[oid])m.comp[oid]={};
    if(!m.comp[oid].passDone)m.comp[oid].passDone={};
    m.comp[oid].passDone[p]=true;
    var b=findBatch(oid);
    var cfg=(m.passesConfig||{})[b?b.kultur:'']||{n:1};
    var n=parseInt(cfg.n)||1;
    var all=true;
    for(var j=0;j<n;j++){if(!m.comp[oid].passDone[j]){all=false;break;}}
    if(all){m.comp[oid].done=true;m.comp[oid].doneDate=dateStr(todayDate());}
  }else{
    if(!m.comp[id])m.comp[id]={};
    m.comp[id].done=true;m.comp[id].doneDate=dateStr(todayDate());
  }
  saveData();render();
}

loadData();
setInterval(loadData,15000);
</script>
</body>
</html>
